baseURL = 'https://prule.github.io/pauls-blog/'
canonifyURLs = true
languageCode = 'en-us'
title = 'Pauls Blog'
theme = 'hugo-simple-beauty'

[security]
  [security.exec]
    allow = ['^asciidoctor$']

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.asciidocExt]
    workingFolderCurrent = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false

[markup.related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[markup.related.indices]]
    name = "tags"
    weight = 100
  [[markup.related.indices]]
    name = "categories"
    weight = 80
  [[markup.related.indices]]
    name = "date"
    weight = 10

# Define the number of posts per page
[pagination]
    pagerSize = 10

[[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
[[menu.main]]
    name = "Categories"
    url = "/categories"
    weight = 2
[[menu.main]]
    name = "Tags"
    url = "/tags"
    weight = 3
[[menu.main]]
    name = "References"
    url = "/page/references"
    weight = 4
[[menu.main]]
    name = "Projects"
    url = "/page/projects"
    weight = 5
[[menu.main]]
    name = "Book Summaries"
    url = "/page/booksummaries"
    weight = 6
[[menu.main]]
    name = "CV"
    url = "/page/cv"
    weight = 7
[[menu.main]]
    name = "Software Development"
    url = "/page/software"
    weight = 7

[params]
  description = "Practical software development: Kotlin, AI-assisted engineering, and clean code."
  slogan = "Programming is life"
  sidebar_avatar = "/images/profile.webp"
  showTableOfContents = true

  # Social links
  linkedin       = "https://www.linkedin.com/in/paulrule/"
  github         = "https://github.com/prule"
  medium         = "https://medium.com/@prule70"
  substack       = "https://paulr70.substack.com"

[services]
  [services.googleAnalytics]
    ID = 'G-QYKTN5W199'
