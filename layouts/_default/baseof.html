<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "head.html" . }}
    {{ partial "head-extend.html" . }}
</head>
<body{{ if .IsPage }} class="single-post"{{ end }}>
    <header class="site-header">
        <div class="container">
            {{ partial "header.html" . }}
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            {{ partial "footer.html" . }}
            {{ partial "footer-extend.html" . }}
        </div>
    </footer>
    {{ partial "body-before-close.html" . }}
</body>
</html>
