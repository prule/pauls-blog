<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    <header class="site-header">
        <div class="container">
            {{ partial "header.html" . }}
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            {{ partial "footer.html" . }}
        </div>
    </footer>
</body>
</html>
