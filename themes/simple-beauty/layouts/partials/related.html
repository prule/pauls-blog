{{ $related := .Site.RegularPages.Related . | first 3 }}
{{ with $related }}
<section class="related-posts" style="margin-top: 6rem; padding-top: 3rem; border-top: 1px solid var(--border-color);">
    <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted-color); margin-bottom: 2rem;">Related Writing</h3>
    <ul style="list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
        {{ range . }}
        <li>
            <div style="font-size: 0.8rem; color: var(--muted-color); margin-bottom: 0.25rem;">{{ .Date.Format "Jan 2, 2006" }}</div>
            <h4 style="font-family: var(--font-serif); font-size: 1.1rem; margin: 0;"><a href="{{ .Permalink }}" style="color: var(--heading-color); text-decoration: none;">{{ .Title }}</a></h4>
        </li>
        {{ end }}
    </ul>
</section>
{{ end }}
